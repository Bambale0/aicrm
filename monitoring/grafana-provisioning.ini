[server]
http_addr = 0.0.0.0
http_port = 3000

[security]
admin_user = ${GF_SECURITY_ADMIN_USER:-admin}
admin_password = ${GF_SECURITY_ADMIN_PASSWORD:-admin}

[users]
default_theme = dark

[database]
type = sqlite3
path = grafana.db

[log]
level = info

[metrics]
enabled = true

[analytics]
reporting_enabled = false
